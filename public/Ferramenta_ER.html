</script>
<style>
:root {
  --marrom: #5C2E0A;
  --laranja: #E05A1A;
  --laranja-cl: #F28C5B;
  --creme: #FDF6EE;
  --bege: #F0E4D4;
  --bege-esc: #E0CEB8;
  --cinza: #2A2420;
  --cinza-m: #7A6A60;
  --verde: #2D7A4F;
  --verde-bg: #E8F4EE;
  --amarelo: #C8860A;
  --amarelo-bg: #FEF3DC;
  --azul: #1A4E7A;
  --azul-bg: #E8F0F8;
  --vermelho: #C0392B;
  --vermelho-bg: #FCE8E8;
  --sidebar: 260px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #1a1410;
  color: var(--cinza);
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar);
  background: var(--marrom);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.sidebar-logo-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--laranja-cl);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.sidebar-logo-title {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  color: #fff;
  line-height: 1.3;
}

.sidebar-nav {
  padding: 16px 0;
  flex: 1;
}

.nav-section {
  padding: 8px 20px 4px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}

.nav-item:hover { background: rgba(255,255,255,0.06); }

.nav-item.active {
  background: rgba(224,90,26,0.2);
  border-left-color: var(--laranja);
}

.nav-item-name {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  flex: 1;
}

.nav-item.active .nav-item-name { color: #fff; }

.nav-maturidade {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
}

.mat-alta    { background: var(--verde-bg); color: var(--verde); }
.mat-avancada{ background: #E8F4EE; color: #1A6B3C; }
.mat-media   { background: #E8F0F8; color: var(--azul); }
.mat-consol  { background: #EEF0F4; color: #3A5A7A; }
.mat-desenv  { background: var(--amarelo-bg); color: var(--amarelo); }
.mat-baixa   { background: var(--vermelho-bg); color: var(--vermelho); }
.mat-vazia   { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }

.sidebar-export {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.btn-export {
  width: 100%;
  background: var(--laranja);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 11px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-export:hover { background: #c84d14; }

/* ── MAIN ── */
.main {
  margin-left: var(--sidebar);
  flex: 1;
  padding: 32px;
  min-height: 100vh;
}

/* ── HEADER DA PÁGINA ── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
}

.page-title {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: #fff;
  line-height: 1.2;
}

.page-subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
}

/* ── MATURIDADE CARD ── */
.maturidade-card {
  background: var(--creme);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.mat-geral-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--cinza-m);
  margin-bottom: 4px;
}

.mat-geral-valor {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
}

.mat-eixos {
  display: flex;
  gap: 16px;
  flex: 1;
}

.mat-eixo {
  flex: 1;
  background: var(--bege);
  border-radius: 6px;
  padding: 12px 14px;
}

.mat-eixo-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--cinza-m);
  margin-bottom: 6px;
}

.mat-eixo-valor {
  font-size: 13px;
  font-weight: 600;
  color: var(--cinza);
  margin-bottom: 6px;
}

.mat-bar-bg {
  height: 5px;
  background: var(--bege-esc);
  border-radius: 3px;
  overflow: hidden;
}

.mat-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}

.mat-pct {
  font-size: 10px;
  color: var(--cinza-m);
  margin-top: 3px;
}

/* ── SEÇÕES ── */
.secao {
  background: var(--creme);
  border-radius: 8px;
  margin-bottom: 16px;
  overflow: hidden;
}

.secao-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--bege);
  border-bottom: 1px solid var(--bege-esc);
  cursor: pointer;
  user-select: none;
}

.secao-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.secao-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.secao-titulo {
  font-size: 14px;
  font-weight: 600;
  color: var(--cinza);
}

.secao-body {
  padding: 16px 20px;
}

/* ── CAMPOS SIMPLES ── */
.campo-grupo {
  margin-bottom: 16px;
}

.campo-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--cinza-m);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

.campo-input {
  width: 100%;
  border: 1px solid var(--bege-esc);
  border-radius: 6px;
  padding: 9px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--cinza);
  background: #fff;
  transition: border-color 0.15s;
  resize: vertical;
}

.campo-input:focus {

/* ── ITENS DINÂMICOS ── */

.item-card-content { flex: 1; display: flex; flex-direction: column; gap: 8px; }

.btn-add {

  font-size: 12px;
  font-weight: 500;
  cursor: pointer;

.btn-add:hover {

/* Lacuna campos extras */
.lacuna-extras {
  display: flex;
  gap: 8px;
  align-items: center;
}

.lacuna-enc-label {
  font-size: 11px;
  color: var(--cinza-m);
  white-space: nowrap;

.lacuna-enc-toggle {

}

.enc-btn {

  border-radius: 4px;

.enc-btn.active-sim {

}

.enc-btn.active-nao {

/* Badges de status */
.status-badge {
  display: inline-block;
  padding: 2px 8px;

}

/* ── DIAGNÓSTICO STATS ── */
.diag-stats {
  display: flex;
  gap: 12px;
  margin-top: 12px;
}

.diag-stat-card {
  flex: 1;
  background: var(--bege);
  border-radius: 6px;
  padding: 12px;
}

.diag-stat-num {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--laranja);
  line-height: 1;
}

.diag-stat-label {
  font-size: 10px;
  color: var(--cinza-m);
  margin-top: 2px;
}

/* ── SÍNTESE TAB ── */
.sintese-grid {
  background: var(--creme);
  border-radius: 8px;
  overflow: hidden;
}

.sintese-table {
  width: 100%;
  border-collapse: collapse;
}

.sintese-table th {

.sintese-table th:first-child {

}

.sintese-table td {

  font-size: 12px;
  border-bottom: 1px solid var(--bege-esc);

}

.sintese-table td:first-child {

}

.sintese-table tr:last-child td { border-bottom: none; }
.sintese-table tr:nth-child(even) td:not(:first-child) { background: #faf5ee; }

.tag-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 10px;
  font-size: 10px;

}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;

  background: var(--cinza);

  padding: 12px 20px;

  font-size: 13px;

  transition: all 0.3s ease;

/* ── CHEVRON ── */
.chevron {

  color: var(--cinza-m);
  font-size: 18px;
}
.chevron.open { transform: rotate(180deg); }

.secao-body.collapsed { display: none; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-tag">Educação Já · 2026</div>
    <div class="sidebar-logo-title">Sistematização de Equidade Racial</div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">Coalizões</div>
    <div id="nav-items"></div>
    <div class="nav-section" style="margin-top:8px">Visão Geral</div>
    <div class="nav-item" id="nav-sintese" onclick="showSintese()">
      <span class="nav-item-name">Síntese Comparativa</span>
    </div>
  </nav>

  <div class="sidebar-export">
    <button class="btn-export" onclick="exportPPTX()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar PPTX
    </button>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button onclick="syncNow()" style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px;color:rgba(255,255,255,0.7);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        ↓ Recarregar dados
      </button>
      <button onclick="exportJSON()" style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px;color:rgba(255,255,255,0.7);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        ↑ Backup JSON
      </button>
    </div>
    <div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:8px;text-align:center;line-height:1.4">
      Dados salvos automaticamente no Google Sheets.<br>Use "Recarregar" para ver edições de colegas.
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="main-content"></main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════════════
const COALIZ_NOMES = ['Anos Finais','Gestão Escolar','Pré-escola','Professores','Tecnologia'];
// ── Configuração do backend Google Sheets ─────────────────────
// Cole aqui a URL gerada ao publicar o Apps Script como Web App:
const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/natura.net/s/AKfycbyOl05rNPk_68TzQdEMGk-7t1ndG4It0A9lDjYcSJqeHv1x873Dd3bxv4rjE04ajOKf/exec';

function defaultCoalizoes() {
  return COALIZ_NOMES.map(nome => ({
    nome,
    diagnostico: [],
    visaoSucesso: '',
    indicadores: [],
    estrategias: [],
    lacunas: [],
    evidencias: [],
  }));
}

// Carrega dados do Google Sheets via Apps Script
async function loadFromSheets() {
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'GET', credentials: 'include' });
    const json = await res.json();
    if (json.ok && Array.isArray(json.dados)) {
      json.dados.forEach(c => {
        if (!Array.isArray(c.diagnostico)) c.diagnostico = [];
      });
      return json.dados;
    }
  } catch(e) {
    console.warn('Não foi possível carregar do Sheets:', e);
  }
  return null;
}

// Grava dados no Google Sheets via Apps Script
async function saveToSheets(dados) {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dados }),
    });
  } catch(e) {
    console.warn('Não foi possível salvar no Sheets:', e);
  }
}

// saveState: grava no Sheets (sem bloquear a UI)
function saveState() {
  saveToSheets(state.coaliz);
}

const state = {
  currentCoalizao: 0,
  currentView: 'coalizao',
  coaliz: defaultCoalizoes(), // preenchido no init
};

// ══════════════════════════════════════════════════════════════
// CÁLCULO DE MATURIDADE
// ══════════════════════════════════════════════════════════════
const STATUS_PESO = {
  estrategias: { 'Em desenvolvimento': 1, 'Piloto': 2, 'Em escala': 3 },
};

function calcEixo(items, tipo) {
  if (!items || items.length === 0) return { pct: 0, nivel: 'Incipiente' };
  const pesos = STATUS_PESO[tipo];
  const max = 3;
  const soma = items.reduce((acc, it) => acc + (pesos[it.status] || 1), 0);
  const pct = (soma / (items.length * max)) * 100;
  const nivel = pct >= 80 ? 'Consolidado' : pct >= 60 ? 'Avançado' : pct >= 35 ? 'Em desenvolvimento' : 'Incipiente';
  return { pct: Math.round(pct), nivel };
}

function calcEixoLacunas(lacunas) {
  if (!lacunas || lacunas.length === 0) return { pct: 0, nivel: 'Incipiente' };
  const max = 3;
  const soma = lacunas.reduce((acc, lac) => {
    if (lac.encaminhamento === 'sim') return acc + 3;
    if (lac.criticidade === 'Alta') return acc + 0;
    if (lac.criticidade === 'Média') return acc + 1;
    return acc + 2; // Baixa sem enc
  }, 0);
  const pct = (soma / (lacunas.length * max)) * 100;
  const nivel = pct >= 80 ? 'Consolidado' : pct >= 60 ? 'Avançado' : pct >= 35 ? 'Em desenvolvimento' : 'Incipiente';
  return { pct: Math.round(pct), nivel };
}

function calcEixoIndicadores(indicadores) {
  if (!indicadores || indicadores.length === 0) return { pct: 0, nivel: 'Incipiente' };
  const somaNotas = indicadores.reduce((acc, ind) => {
    const statusVal = ind.statusQualidade === 'Tem' ? 2 : ind.statusQualidade === 'Tem parcialmente' ? 1 : 0;
    const estadosVal = ind.resultadoEstados === 'S' ? 2 : ind.resultadoEstados === 'P' ? 1 : 0;
    const nacionalVal = ind.resultadoNacional === 'S' ? 2 : ind.resultadoNacional === 'P' ? 1 : 0;
    return acc + (statusVal + estadosVal + nacionalVal) / 3;
  }, 0);
  const media = somaNotas / indicadores.length; // 0 a 2
  const pct = Math.round((media / 2) * 100);
  const nivel = pct >= 80 ? 'Consolidado' : pct >= 60 ? 'Avançado' : pct >= 35 ? 'Em desenvolvimento' : 'Incipiente';
  return { pct, nivel };
}

function calcMaturidade(c) {
  const e1 = calcEixoIndicadores(c.indicadores);
  const e2 = calcEixo(c.estrategias, 'estrategias');
  const e3 = calcEixoLacunas(c.lacunas);

  const temDados = c.indicadores.length > 0 || c.estrategias.length > 0 || c.lacunas.length > 0;
  if (!temDados) return { nivel: '—', e1, e2, e3, media: 0 };

  const media = Math.round((e1.pct + e2.pct + e3.pct) / 3);
  const niveis = ['Inicial', 'Em desenvolvimento', 'Em consolidação', 'Média', 'Avançada', 'Alta'];

  let idx;
  if      (media >= 85) idx = 5;
  else if (media >= 70) idx = 4;
  else if (media >= 55) idx = 3;
  else if (media >= 40) idx = 2;
  else if (media >= 25) idx = 1;
  else                  idx = 0;

  const nIncipientes = [e1, e2, e3].filter(e => e.nivel === 'Incipiente').length;
  if (nIncipientes >= 2) idx = Math.max(0, idx - 2);
  else if (nIncipientes === 1) idx = Math.max(0, idx - 1);

  const todosConsolidados = [e1, e2, e3].every(e => e.nivel === 'Consolidado');
  if (todosConsolidados) idx = Math.min(5, idx + 1);

  return { nivel: niveis[idx], e1, e2, e3, media };
}

function matClass(nivel) {
  const m = { 'Alta': 'mat-alta', 'Avançada': 'mat-avancada', 'Média': 'mat-media', 'Em consolidação': 'mat-consol', 'Em desenvolvimento': 'mat-desenv', 'Inicial': 'mat-baixa', '—': 'mat-vazia' };
  return m[nivel] || 'mat-vazia';
}

function eixoColor(nivel) {
  if (nivel === 'Consolidado') return '#2D7A4F';
  if (nivel === 'Avançado') return '#1A6B3C';
  if (nivel === 'Em desenvolvimento') return '#C8860A';
  return '#C0392B';
}

// ══════════════════════════════════════════════════════════════
// RENDER SIDEBAR NAV
// ══════════════════════════════════════════════════════════════
function renderNav() {
  const container = document.getElementById('nav-items');
  container.innerHTML = state.coaliz.map((c, i) => {
    const mat = calcMaturidade(c);
    const isActive = state.currentView === 'coalizao' && state.currentCoalizao === i;
    return `<div class="nav-item ${isActive ? 'active' : ''}" onclick="showCoalizao(${i})">
      <span class="nav-item-name">${c.nome}</span>
      <span class="nav-maturidade ${matClass(mat.nivel)}">${mat.nivel}</span>
    </div>`;
  }).join('');

  const sintNav = document.getElementById('nav-sintese');
  sintNav.className = 'nav-item' + (state.currentView === 'sintese' ? ' active' : '');
}

// ══════════════════════════════════════════════════════════════
// RENDER COALIZÃO
// ══════════════════════════════════════════════════════════════
function showCoalizao(i) {
  state.currentCoalizao = i;
  state.currentView = 'coalizao';
  renderNav();
  renderCoalizao();
}

function showSintese() {
  state.currentView = 'sintese';
  renderNav();
  renderSintese();
}

function renderCoalizao() {
  const c = state.coaliz[state.currentCoalizao];
  const mat = calcMaturidade(c);
  const main = document.getElementById('main-content');

  main.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${c.nome}</div>
        <div class="page-subtitle">Equidade Racial · Educação Já 2026</div>
      </div>
    </div>

    <!-- Maturidade -->
    <div class="maturidade-card">
      <div>
        <div class="mat-geral-label">Maturidade Geral</div>
        <div class="mat-geral-valor" style="color:${mat.nivel==='Alta'?'#2D7A4F':mat.nivel==='Avançada'?'#1A6B3C':mat.nivel==='Média'?'#1A4E7A':mat.nivel==='Em consolidação'?'#3A5A7A':mat.nivel==='Em desenvolvimento'?'#C8860A':'#C0392B'}">${mat.nivel}</div>
        <div style="font-size:11px;color:var(--cinza-m);margin-top:2px">Média dos eixos: ${mat.media}%</div>
      </div>
      <div class="mat-eixos">
        ${renderEixoBar('Indicadores', mat.e1)}
        ${renderEixoBar('Estratégias', mat.e2)}
        ${renderEixoBar('Lacunas', mat.e3)}
      </div>
    </div>

    <!-- Diagnóstico -->
    ${renderSecao(0, 'Diagnóstico e Contexto', '#E05A1A', `
      <div style="font-size:11px;color:var(--cinza-m);margin-bottom:12px;padding:8px 12px;background:var(--bege);border-radius:5px;">
        📋 Campo informativo — adicione os dados de contexto relevantes para esta coalizão (indicadores, gaps, dados de desigualdade, etc.)<br>
        <span style="color:#C8860A;font-weight:600">⚠ PPT: máx. 140 caracteres por item</span>
      </div>
      <div class="items-lista" id="lista-diagnostico">${c.diagnostico.map((it,i) => {
        const lim = 140; const len = (it.texto||'').length;
        const cor = len > lim ? '#C0392B' : len > lim*0.85 ? '#C8860A' : '#7A6A60';
        return `<div class="item-card">
          <div class="item-card-content">
            <textarea class="item-texto-input" rows="2" maxlength="${lim}"
              oninput="upDiag(${i},this.value);updateCharCount(this,'char-diag-${i}',${lim})"
              placeholder="Ex: 40% dos estudantes pretos possuem aprendizagem adequada em Matemática, vs 67% dos brancos de alto NSE.">${it.texto||''}</textarea>
            <div class="char-count" id="char-diag-${i}" style="color:${cor}">${len}/${lim}</div>
          </div>
          <button class="item-remove" onclick="removeItem('diagnostico',${i})">×</button>
        </div>`;
      }).join('')}
      </div>
      <button class="btn-add" onclick="addItem('diagnostico')">+ Adicionar informação de contexto</button>
      <div class="campo-grupo" style="margin-top:16px">
        <div class="campo-label" style="display:flex;justify-content:space-between;align-items:center">
          <span>Visão de Sucesso</span>
          <span class="char-count" id="char-visao" style="color:${((c.visaoSucesso||'').length>119)?'#C8860A':'#7A6A60'}">${(c.visaoSucesso||'').length}/140</span>
        </div>
        <textarea class="campo-input" rows="2" maxlength="140"
          oninput="upVisao(this.value);updateCharCount(this,'char-visao',140)"
          placeholder="Reduzir gap para ≤10 p.p. até 2028...">${c.visaoSucesso}</textarea>
      </div>
    `)}

    <!-- Indicadores -->
    ${renderSecao(1, 'Indicadores', '#1A4E7A', `
      <div style="font-size:11px;color:var(--cinza-m);margin-bottom:12px;padding:8px 12px;background:var(--bege);border-radius:5px;">
        📊 Adicione indicadores de equidade racial. A nota do eixo é a média das notas individuais (escala 0–2).
      </div>
      <div class="items-lista" id="lista-indicadores">${c.indicadores.map((it,i) => renderItemIndicador(it,i)).join('')}</div>
      <button class="btn-add" onclick="addItem('indicadores')">+ Adicionar indicador</button>
    `)}

    <!-- Estratégias -->
    ${renderSecao(2, 'Estratégias Existentes', '#E05A1A', `
      <div class="items-lista" id="lista-estrategias">${c.estrategias.map((it,i) => renderItemEstrategia(it,i)).join('')}</div>
      <button class="btn-add" onclick="addItem('estrategias')">+ Adicionar estratégia</button>
    `)}

    <!-- Lacunas -->
    ${renderSecao(3, 'Lacunas', '#C8860A', `
      <div class="items-lista" id="lista-lacunas">${c.lacunas.map((it,i) => renderItemLacuna(it,i)).join('')}</div>
      <button class="btn-add" onclick="addItem('lacunas')">+ Adicionar lacuna</button>
    `)}

    <!-- Evidências -->
    ${renderSecao(4, 'Evidências (registro)', '#7A6A60', `
      <div style="font-size:11px;color:var(--cinza-m);margin-bottom:12px;padding:8px 12px;background:var(--bege);border-radius:5px;">
        📋 Registro informativo — não influencia o cálculo de maturidade<br>
        <span style="color:#C8860A;font-weight:600">⚠ PPT: máx. 3 itens · máx. 100 caracteres por item (faixa compacta no rodapé)</span>
      </div>
      <div class="items-lista" id="lista-evidencias">${c.evidencias.map((it,i) => renderItemEvidencia(it,i)).join('')}</div>
      <button class="btn-add" onclick="addItem('evidencias')">+ Adicionar evidência</button>
    `)}
  `;
}

function renderEixoBar(label, eixo) {
  const cor = eixoColor(eixo.nivel);
  return `<div class="mat-eixo">
    <div class="mat-eixo-label">${label}</div>
    <div class="mat-eixo-valor" style="color:${cor}">${eixo.nivel}</div>
    <div class="mat-bar-bg"><div class="mat-bar-fill" style="width:${eixo.pct}%;background:${cor}"></div></div>
    <div class="mat-pct">${eixo.pct}%</div>
  </div>`;
}

function renderSecao(num, titulo, cor, conteudo) {
  const nums = ['01','02','03','04','05','06'];
  return `<div class="secao">
    <div class="secao-header" onclick="toggleSecao(this)">
      <div class="secao-header-left">
        <div class="secao-num" style="background:${cor}">${nums[num]}</div>
        <div class="secao-titulo">${titulo}</div>
      </div>
      <span class="chevron open">▾</span>
    </div>
    <div class="secao-body">${conteudo}</div>
  </div>`;
}

function toggleSecao(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('collapsed');
  chevron.classList.toggle('open');
}

// Items
function renderItemEstrategia(it, i) {
  const opts = ['Em desenvolvimento','Piloto','Em escala'];
  return `<div class="item-card">
    <div class="item-card-content">
      <div class="item-card-row">
        <textarea class="item-texto-input" rows="2" oninput="upItem('estrategias',${i},'texto',this.value)" placeholder="Descreva a estratégia...">${it.texto||''}</textarea>
        <select class="item-select" onchange="upItem('estrategias',${i},'status',this.value)">
          ${opts.map(o => `<option value="${o}" ${it.status===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
    </div>
    <button class="item-remove" onclick="removeItem('estrategias',${i})">×</button>
  </div>`;
}

function renderItemIndicador(it, i) {
  const tipoOpts = ['Alcance','Transformação'];
  const statusOpts = [['Tem',2],['Tem parcialmente',1]];
  const resultOpts = [['Não (N)',0],['Parcialmente (P)',1],['Sim (S)',2]];
  const statusVal = it.statusQualidade === 'Tem' ? 2 : it.statusQualidade === 'Tem parcialmente' ? 1 : 0;
  const estadosVal = it.resultadoEstados === 'S' ? 2 : it.resultadoEstados === 'P' ? 1 : 0;
  const nacionalVal = it.resultadoNacional === 'S' ? 2 : it.resultadoNacional === 'P' ? 1 : 0;
  const nota = ((statusVal + estadosVal + nacionalVal) / 3).toFixed(2);
  return `<div class="item-card">
    <div class="item-card-content">
      <div class="item-card-row">
        <textarea class="item-texto-input" rows="2" oninput="upItem('indicadores',${i},'texto',this.value)" placeholder="Nome/descrição do indicador...">${it.texto||''}</textarea>
        <select class="item-select" onchange="upItem('indicadores',${i},'tipo',this.value)">
          ${tipoOpts.map(o => `<option value="${o}" ${it.tipo===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div class="item-card-row" style="gap:6px;flex-wrap:wrap">
        <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:130px">
          <span style="font-size:10px;color:var(--cinza-m);font-weight:600">Status de qualidade</span>
          <select class="item-select" onchange="upItem('indicadores',${i},'statusQualidade',this.value);renderCoalizao()">
            <option value="" ${!it.statusQualidade?'selected':''}>—</option>
            ${statusOpts.map(([label]) => `<option value="${label}" ${it.statusQualidade===label?'selected':''}>${label}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:130px">
          <span style="font-size:10px;color:var(--cinza-m);font-weight:600">Resultado ≥2 estados</span>
          <select class="item-select" onchange="upItem('indicadores',${i},'resultadoEstados',this.value);renderCoalizao()">
            <option value="" ${!it.resultadoEstados?'selected':''}>—</option>
            <option value="N" ${it.resultadoEstados==='N'?'selected':''}>Não (N)</option>
            <option value="P" ${it.resultadoEstados==='P'?'selected':''}>Parcialmente (P)</option>
            <option value="S" ${it.resultadoEstados==='S'?'selected':''}>Sim (S)</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:130px">
          <span style="font-size:10px;color:var(--cinza-m);font-weight:600">Resultado nacional</span>
          <select class="item-select" onchange="upItem('indicadores',${i},'resultadoNacional',this.value);renderCoalizao()">
            <option value="" ${!it.resultadoNacional?'selected':''}>—</option>
            <option value="N" ${it.resultadoNacional==='N'?'selected':''}>Não (N)</option>
            <option value="P" ${it.resultadoNacional==='P'?'selected':''}>Parcialmente (P)</option>
            <option value="S" ${it.resultadoNacional==='S'?'selected':''}>Sim (S)</option>

        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:2px">

function renderSintese() {
  const main = document.getElementById('main-content');

  const dimensoes = [
    { label: 'Maturidade Geral', fn: c => { const m = calcMaturidade(c); return { tag: m.nivel, cl: matClass(m.nivel) }; } },
    { label: 'Diagnóstico (dados)', fn: c => c.diagnostico.stat1 ? { tag: 'Sim', cl: 'mat-alta' } : { tag: 'Não', cl: 'mat-baixa' } },
    { label: 'Visão de Sucesso', fn: c => c.visaoSucesso ? { tag: 'Sim', cl: 'mat-alta' } : { tag: 'Não', cl: 'mat-baixa' } },
    { label: 'Eixo Indicadores', fn: c => { const e = calcEixoIndicadores(c.indicadores); return { tag: e.nivel+' ('+e.pct+'%)', cl: e.nivel==='Consolidado'?'mat-alta':e.nivel==='Avançado'?'mat-avancada':e.nivel==='Em desenvolvimento'?'mat-desenv':'mat-baixa' }; } },
    { label: 'Eixo Estratégias', fn: c => { const e = calcEixo(c.estrategias,'estrategias'); return { tag: e.nivel+' ('+e.pct+'%)', cl: e.nivel==='Consolidado'?'mat-alta':e.nivel==='Avançado'?'mat-avancada':e.nivel==='Em desenvolvimento'?'mat-desenv':'mat-baixa' }; } },
    { label: 'Eixo Lacunas', fn: c => { const e = calcEixoLacunas(c.lacunas); return { tag: e.nivel+' ('+e.pct+'%)', cl: e.nivel==='Consolidado'?'mat-alta':e.nivel==='Avançado'?'mat-avancada':e.nivel==='Em desenvolvimento'?'mat-desenv':'mat-baixa' }; } },
    { label: 'Evidências registradas', fn: c => c.evidencias.length > 0 ? { tag: c.evidencias.length+' registradas', cl: 'mat-media' } : { tag: 'Nenhuma', cl: 'mat-vazia' } },
  ];

  main.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Síntese Comparativa</div>
        <div class="page-subtitle">Visão geral das 5 coalizões · Equidade Racial 2026</div>
      </div>
    </div>

    <div class="sintese-grid">
      <table class="sintese-table">
        <thead>
          <tr>
            <th>Dimensão</th>
            ${state.coaliz.map(c => `<th>${c.nome}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${dimensoes.map(dim => `
            <tr>
              <td>${dim.label}</td>
              ${state.coaliz.map(c => {
                const r = dim.fn(c);
                return `<td><span class="tag-pill ${r.cl}" style="font-size:10px">${r.tag}</span></td>`;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div style="margin-top:20px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
      ${state.coaliz.map(c => {
        const mat = calcMaturidade(c);
        return `<div style="background:var(--creme);border-radius:8px;padding:16px">
          <div style="font-size:11px;font-weight:700;color:var(--cinza-m);margin-bottom:8px">${c.nome}</div>
          ${renderEixoBar('Indicadores', mat.e1)}
          <div style="height:8px"></div>
          ${renderEixoBar('Estratégias', mat.e2)}
          <div style="height:8px"></div>
          ${renderEixoBar('Lacunas', mat.e3)}
        </div>`;
      }).join('')}
    </div>
  `;
}

// MUTAÇÕES DE ESTADO
// ══════════════════════════════════════════════════════════════
function updateCharCount(textarea, counterId, limit) {
  const el = document.getElementById(counterId);
  if (!el) return;
  const len = textarea.value.length;
  el.textContent = len + '/' + limit;
  el.style.color = len > limit * 0.94 ? '#C0392B' : len > limit * 0.80 ? '#C8860A' : '#7A6A60';
}

function upDiag(idx, val) {
  state.coaliz[state.currentCoalizao].diagnostico[idx].texto = val;
  saveState(); refreshMat();
}
function upVisao(val) {
  state.coaliz[state.currentCoalizao].visaoSucesso = val;
  saveState(); refreshMat();
}
function upItem(tipo, idx, campo, val) {
  state.coaliz[state.currentCoalizao][tipo][idx][campo] = val;
  saveState(); refreshMat();
}
function addItem(tipo) {
  const defaults = {
    diagnostico: { texto: '' },
    indicadores: { texto: '', tipo: 'Alcance', statusQualidade: '', resultadoEstados: '', resultadoNacional: '' },
    estrategias: { texto: '', status: 'Em desenvolvimento' },
    lacunas: { texto: '', criticidade: 'Média', encaminhamento: 'nao', recomendacao: '' },
    evidencias: { texto: '' },
  };
  state.coaliz[state.currentCoalizao][tipo].push({ ...defaults[tipo] });
  saveState(); renderCoalizao();
}
function removeItem(tipo, idx) {
  state.coaliz[state.currentCoalizao][tipo].splice(idx, 1);
  saveState(); renderCoalizao();
}
function refreshMat() {
  // Atualiza só o card de maturidade sem re-renderizar tudo
  const mat = calcMaturidade(state.coaliz[state.currentCoalizao]);
  renderNav();
  // Atualiza card maturidade
  const card = document.querySelector('.maturidade-card');
  if (card) {
    const cor = mat.nivel==='Alta'?'#2D7A4F':mat.nivel==='Avançada'?'#1A6B3C':mat.nivel==='Média'?'#1A4E7A':mat.nivel==='Em consolidação'?'#3A5A7A':mat.nivel==='Em desenvolvimento'?'#C8860A':'#C0392B';
    card.querySelector('.mat-geral-valor').textContent = mat.nivel;
    card.querySelector('.mat-geral-valor').style.color = cor;
    card.querySelector('.mat-geral-valor').nextElementSibling.textContent = 'Média dos eixos: '+mat.media+'%';
    card.querySelector('.mat-eixos').innerHTML =
      renderEixoBar('Indicadores', mat.e1) +
      renderEixoBar('Estratégias', mat.e2) +
      renderEixoBar('Lacunas', mat.e3);
  }
}

      s.addShape(pres.ShapeType.ellipse,{x:cX,y:yE,w:circR,h:circR,fill:{color:C.laranja},line:{color:C.laranja}});
      s.addText(String(idx+1),{x:cX,y:yE,w:circR,h:circR,fontSize:7,bold:true,color:C.branco,align:'center',valign:'middle',fontFace:'Calibri'});
      s.addText(txt,{x:tX,y:yE,w:eTW,h:tH,fontSize:itemFS,color:C.cinza,fontFace:'Calibri',wrap:true,valign:'top'});
      const bMidY = yE + (circR - bdgH) / 2;
      s.addShape(pres.ShapeType.roundRect,{x:bX,y:bMidY,w:bdgW,h:bdgH,fill:{color:b.bg},line:{color:b.bg},rectRadius:0.025});
      s.addText(b.label,{x:bX,y:bMidY,w:bdgW,h:bdgH,fontSize:7,bold:true,color:b.cor,align:'center',valign:'middle',fontFace:'Calibri',wrap:false,shrinkText:true});
      yE += totalH;
    });

    // ── Col 3: Lacunas ──
    // Ícone à esquerda: triângulo ! (criticidade) + bolinha encaminhamento abaixo
    const tRI   = 0.155; // tamanho do triângulo
    const encR  = 0.10;  // raio da bolinha de encaminhamento
    const lLeftW = leftZone;  // mesma zona esq das outras colunas
    const lTW    = colW - PAD*0.6 - lLeftW - PAD*0.4 - 0.04;
    let yL = itemStartY;
    c.lacunas.slice(0,6).forEach((lac,idx) => {
      const txt    = lac.texto||'—';
      const recTxt = lac.encaminhamento==='sim' && lac.recomendacao ? '→ '+lac.recomendacao : '';
      const tH     = estH(txt, lTW, itemFS);
      const recH   = recTxt ? estH(recTxt, lTW, 7) : 0;
      const boxH   = tH + recH;                        // caixa única: item + encaminhamento
      const iconH  = tRI + 0.02 + encR;
      const blockH = Math.max(iconH, boxH);
      const totalH = blockH + itmGap;
      if (yL + totalH > colBot) return;

      const cX = colW*2 + PAD*0.6;
      const tX = cX + lLeftW;
      const critCor = lac.criticidade==='Alta'?C.vermelho:lac.criticidade==='Média'?C.amarelo:C.cinzaM;
      const encCor  = lac.encaminhamento==='sim'?C.verde:C.cinzaM;

      // Triângulo de criticidade
      s.addShape('triangle',{x:cX,y:yL,w:tRI,h:tRI,fill:{color:critCor},line:{color:critCor}});
      s.addText('!',{x:cX-0.005,y:yL+0.01,w:tRI,h:tRI*0.75,fontSize:7,bold:true,color:C.branco,align:'center',valign:'middle',fontFace:'Calibri'});
      // Bolinha de encaminhamento logo abaixo do triângulo
      const bY = yL + tRI + 0.02;
      s.addShape(pres.ShapeType.ellipse,{x:cX+(tRI-encR)/2,y:bY,w:encR,h:encR,fill:{color:encCor},line:{color:encCor}});

      // Caixa de texto única: item + encaminhamento no mesmo bloco
      if (recTxt) {
        s.addText([
          {text: txt,    options:{fontSize:itemFS, color:C.cinza,  fontFace:'Calibri', breakLine:true}},
          {text: recTxt, options:{fontSize:7,      color:C.cinzaM, fontFace:'Calibri', italic:true}}
        ],{x:tX,y:yL,w:lTW,h:boxH,wrap:true,valign:'top'});
      } else {
        s.addText(txt,{x:tX,y:yL,w:lTW,h:blockH,fontSize:itemFS,color:C.cinza,fontFace:'Calibri',wrap:true,valign:'top'});
      }
      yL += totalH;
    });

    // ── Faixa Evidências ──
    const evY = H - evH;
    s.addShape(pres.ShapeType.rect,{x:0,y:evY,w:W,h:evH,fill:{color:'F0E8DF'},line:{color:C.begeE}});
    s.addShape(pres.ShapeType.rect,{x:0,y:evY,w:W,h:0.022,fill:{color:C.cinzaM},line:{color:C.cinzaM}});
    s.addText('05 — EVIDÊNCIAS',{x:PAD,y:evY+0.05,w:1.45,h:0.19,fontSize:10,bold:true,color:C.cinzaM,charSpacing:0.3,fontFace:'Calibri'});
    if (c.evidencias && c.evidencias.length > 0) {
      const evTexts = c.evidencias.slice(0, CHAR_LIMITS.evidenciaMax)
        .map((e,i) => `${i+1}. ${(e.texto||'').slice(0, CHAR_LIMITS.evidenciaItem)}`)
        .join('    ');
      // Ponto 5: fonte 9 para evidências (mais compacto, não estoura)
      s.addText(evTexts,{x:PAD+1.5,y:evY+0.04,w:W-PAD*2-1.55,h:evH-0.07,fontSize:7,color:C.cinzaM,fontFace:'Calibri',wrap:true,valign:'top'});
    }
    // Ponto 8: removido nome+página do rodapé (conflitava com evidências)
  }

  // ── SLIDE SÍNTESE ─────────────────────────────────────────
  {
    const sint = pres.addSlide();
    sint.background = { color: C.creme };
    const W=10, H=5.625, PAD=0.28;

    sint.addShape(pres.ShapeType.rect,{x:0,y:0,w:W,h:0.62,fill:{color:C.laranja},line:{color:C.laranja}});
    sint.addText('Síntese Comparativa entre Coalizões',{x:PAD,y:0,w:8,h:0.48,fontSize:18,color:C.branco,fontFace:'Georgia',valign:'middle'});
    sint.addText('Presença de estratégias de equidade racial por dimensão · Educação Já 2026',{x:PAD,y:0.44,w:8,h:0.18,fontSize:10,color:'FFD8C0',fontFace:'Calibri'});

    const gridX  = PAD, gridY = 0.72, labelW = 1.35;
    const cellW  = (W - PAD*2 - labelW) / 5;
    const hdrRow = 0.36;
    const nRows  = 4;
    const cellH  = (H - gridY - hdrRow - 0.06) / nRows;

    sint.addShape(pres.ShapeType.rect,{x:gridX,y:gridY,w:labelW,h:hdrRow,fill:{color:C.marrom},line:{color:C.marrom}});
    state.coaliz.forEach((c,i) => {
      sint.addShape(pres.ShapeType.rect,{x:gridX+labelW+i*cellW,y:gridY,w:cellW,h:hdrRow,fill:{color:C.marrom},line:{color:C.marrom}});
      sint.addText(c.nome,{x:gridX+labelW+i*cellW+0.04,y:gridY,w:cellW-0.08,h:hdrRow,fontSize:10,bold:true,color:C.branco,align:'center',fontFace:'Calibri',valign:'middle',wrap:true});
    });

    const dimsSint = [
      { label:'Maturidade Geral', fn: c => { const m=calcMaturidade(c); return {nivel:m.nivel, pct:null, bg:m.nivel==='Alta'?'E8F4EE':m.nivel==='Avançada'?'D4EDE0':m.nivel==='Média'?'E8F0F8':m.nivel==='Em consolidação'?'EEF0F4':m.nivel==='Em desenvolvimento'?'FEF3DC':'FCE8E8', cor:matCorHex(m.nivel)}; }},
      { label:'Eixo Indicadores', fn: c => { const e=calcEixoIndicadores(c.indicadores); return {nivel:e.nivel, pct:e.pct+'%', bg:e.nivel==='Consolidado'?'E8F4EE':e.nivel==='Avançado'?'D4EDE0':e.nivel==='Em desenvolvimento'?'FEF3DC':'FCE8E8', cor:eixoNivCor(e.nivel)}; }},
      { label:'Eixo Estratégias',  fn: c => { const e=calcEixo(c.estrategias,'estrategias'); return {nivel:e.nivel, pct:e.pct+'%', bg:e.nivel==='Consolidado'?'E8F4EE':e.nivel==='Avançado'?'D4EDE0':e.nivel==='Em desenvolvimento'?'FEF3DC':'FCE8E8', cor:eixoNivCor(e.nivel)}; }},
      { label:'Eixo Lacunas',      fn: c => { const e=calcEixoLacunas(c.lacunas);            return {nivel:e.nivel, pct:e.pct+'%', bg:e.nivel==='Consolidado'?'E8F4EE':e.nivel==='Avançado'?'D4EDE0':e.nivel==='Em desenvolvimento'?'FEF3DC':'FCE8E8', cor:eixoNivCor(e.nivel)}; }},
    ];

    dimsSint.forEach((dim,row) => {
      const rowY  = gridY + hdrRow + row*cellH;
      const rowBg = row%2===0 ? C.branco : C.bege;
      sint.addShape(pres.ShapeType.rect,{x:gridX,y:rowY,w:labelW,h:cellH,fill:{color:rowBg},line:{color:C.begeE}});
      sint.addText(dim.label,{x:gridX+0.08,y:rowY+0.05,w:labelW-0.14,h:cellH-0.1,fontSize:10,bold:true,color:C.cinza,fontFace:'Calibri',wrap:true,valign:'middle'});
      state.coaliz.forEach((c,col) => {
        const r  = dim.fn(c);
        const cx = gridX+labelW+col*cellW;
        sint.addShape(pres.ShapeType.rect,{x:cx,y:rowY,w:cellW,h:cellH,fill:{color:rowBg},line:{color:C.begeE}});
        sint.addShape(pres.ShapeType.roundRect,{x:cx+0.06,y:rowY+0.05,w:cellW-0.12,h:cellH-0.10,fill:{color:r.bg},line:{color:r.bg},rectRadius:0.05});
        if (r.pct) {
          // Ponto 7: nível na linha de cima, % na linha de baixo, fontes maiores
          const halfH = (cellH-0.10)/2;
          sint.addText(r.nivel,{x:cx+0.06,y:rowY+0.05,w:cellW-0.12,h:halfH,fontSize:11,bold:true,color:r.cor,align:'center',fontFace:'Calibri',valign:'bottom',wrap:false,shrinkText:true});
          sint.addText('('+r.pct+')',{x:cx+0.06,y:rowY+0.05+halfH,w:cellW-0.12,h:halfH,fontSize:10,bold:true,color:r.cor,align:'center',fontFace:'Calibri',valign:'top',wrap:false});
        } else {
          sint.addText(r.nivel,{x:cx+0.06,y:rowY+0.05,w:cellW-0.12,h:cellH-0.10,fontSize:12,bold:true,color:r.cor,align:'center',fontFace:'Calibri',valign:'middle',wrap:false,shrinkText:true});
        }
      });
    });
  }

  await pres.writeFile({ fileName: 'ER_Sistematizacao_Educacao_Ja_2026.pptx' });
  showToast('✓ PPTX exportado com sucesso!');
}

// ══════════════════════════════════════════════════════════════
// JSON EXPORT / IMPORT
// ══════════════════════════════════════════════════════════════
// Backup local em JSON (segurança)
function exportJSON() {
  const blob = new Blob([JSON.stringify(state.coaliz, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ER_Sistematizacao_backup.json';
  a.click();
  showToast('✓ Backup JSON exportado!');
}

// Recarrega dados do Sheets manualmente
async function syncNow() {
  showToast('Recarregando dados...');
  const dados = await loadFromSheets();
  if (dados) {
    state.coaliz = dados;
    renderNav();
    showCoalizao(state.currentCoalizao);
    showToast('✓ Dados atualizados!');
  } else {
    showToast('Não foi possível recarregar. Verifique a conexão.');
  }
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const dados = JSON.parse(e.target.result);
      if (!Array.isArray(dados)) throw new Error('Formato inválido');
      dados.forEach(c => { if (!Array.isArray(c.diagnostico)) c.diagnostico = []; });
      state.coaliz = dados;
      saveState();
      renderNav();
      showCoalizao(state.currentCoalizao);
      showToast('✓ Dados importados com sucesso!');
    } catch(err) {
      showToast('Erro ao importar — verifique o arquivo.');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init() {
  // Mostra loading enquanto carrega do Sheets
  document.getElementById('main-content').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:80vh;flex-direction:column;gap:16px">' +
    '<div style="width:36px;height:36px;border:3px solid #E05A1A;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>' +
    '<div style="font-family:DM Sans,sans-serif;font-size:13px;color:#888">Carregando dados...</div>' +
    '</div>';

  if (APPS_SCRIPT_URL) {
    const dados = await loadFromSheets();
    if (dados) state.coaliz = dados;
  }

  renderNav();
  showCoalizao(0);
}

// Animação de loading
const styleEl = document.createElement('style');
styleEl.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(styleEl);

init();
</script>
